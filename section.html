<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AcadEase – Section Details</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <header class="top-nav">
      <div class="logo">
        <span class="logo-icon">⌛</span>
        <span class="logo-text">AcadEase</span>
      </div>

      <div class="top-nav-actions detail-nav-actions">
        <a class="primary-btn detail-home-link" href="index.html">Return to home</a>
      </div>
    </header>

    <main class="main-content detail-main">
      <section class="section detail-section" aria-live="polite">
        <div class="section-header">
          <p class="tagline" id="detailSubtitle"></p>
          <h1 id="detailTitle"></h1>
        </div>
        <p class="detail-description" id="detailDescription"></p>
        <ul class="detail-highlights" id="detailHighlights" aria-label="Key highlights"></ul>
        <div class="detail-extra" id="detailExtra"></div>
      </section>
    </main>

    <footer class="footer detail-footer">
      <p>© 2025–2026 AcadEase. All rights reserved.</p>
    </footer>

    <script src="script.js"></script>
    <script src="section.js"></script>
  </body>
</html>
